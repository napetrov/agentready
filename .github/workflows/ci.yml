name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  readiness:
    name: AgentReady (self)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to upload the SARIF report to the code-scanning dashboard.
      security-events: write
      # Required for the sticky PR comment on pull_request runs.
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # Full history so diff mode can compare against the PR base.
          fetch-depth: 0
          persist-credentials: false

      # Dogfood the bundled first-party Action against this repository. On pull
      # requests it runs in diff mode and posts a sticky comment; on push it runs
      # a full scan. Either way it writes SARIF for the code-scanning dashboard.
      - name: AgentReady scan (push)
        id: scan
        if: github.event_name != 'pull_request'
        uses: ./
        with:
          mode: scan
          fail-on-severity: error
          upload-sarif: 'true'
          job-summary: 'true'

      - name: AgentReady diff (pull request)
        id: diff
        if: github.event_name == 'pull_request'
        uses: ./
        with:
          mode: diff
          base-ref: origin/${{ github.base_ref }}
          head-ref: HEAD
          fail-on-regression: 'true'
          upload-sarif: 'true'
          job-summary: 'true'
          pr-comment: 'true'
          # Keep the PR thread quiet on clean runs; the verdict still lands in
          # the job summary. A prior comment is refreshed once findings resolve.
          pr-comment-condition: 'on-findings'

      - name: Upload SARIF to code scanning
        # Pinned to a commit SHA (v4.36.1) for supply-chain consistency with the
        # other actions in this workflow; bump alongside Dependabot updates. v4 is
        # the current major (it runs on the Node 24 runtime, matching this
        # Action's own node24 runtime).
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463
        # Skip for pull requests from forks: GitHub downgrades the token to
        # read-only there, so `security-events: write` is unavailable and the
        # upload would fail. `continue-on-error` keeps the job green for any
        # other read-only context (e.g. Dependabot) so the scan/comment path
        # still reports.
        if: >-
          always()
          && (steps.scan.outputs.sarif-report-path || steps.diff.outputs.sarif-report-path)
          && (github.event_name != 'pull_request'
              || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif-report-path || steps.diff.outputs.sarif-report-path }}

  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        # Run with coverage so the 80% thresholds in jest.config.js gate CI.
        run: npm run test:coverage -- --runInBand

      - name: AgentReady self scan
        run: npm run agentready -- scan . --json --compact

      - name: AgentReady fixture smoke
        run: npm run agentready:fixtures

      - name: AgentReady pack/install smoke
        run: npm run agentready:pack-smoke

      - name: AgentReady schema drift check
        run: npm run agentready:schemas -- --check

      - name: AgentReady action smoke
        run: npm run agentready:action-smoke

      - name: Action bundle is up to date
        run: git diff --exit-code action/dist

      - name: AgentReady analytics-layer evaluation
        # Offline gold-corpus eval of the optional LLM layer (canned responses,
        # no model calls); fails if precision/recall/F1 drop below the floor.
        run: npm run agentready:eval

      - name: AgentReady PR regression gate
        if: github.event_name == 'pull_request'
        run: npm run agentready -- diff --base "origin/${BASE_REF}" --head HEAD . --json --compact --fail-on-regression
        env:
          BASE_REF: ${{ github.base_ref }}

      - name: AgentReady markdown report
        if: github.event_name == 'pull_request'
        run: npm run agentready -- diff --base "origin/${BASE_REF}" --head HEAD . --markdown
        env:
          BASE_REF: ${{ github.base_ref }}

      - name: Build
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
