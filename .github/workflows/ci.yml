name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        # Run with coverage so the 80% thresholds in jest.config.js gate CI.
        run: npm run test:coverage -- --runInBand

      - name: AgentReady self scan
        run: npm run agentready -- scan . --json --compact

      - name: AgentReady fixture smoke
        run: npm run agentready:fixtures

      - name: AgentReady pack/install smoke
        run: npm run agentready:pack-smoke

      - name: AgentReady schema drift check
        run: npm run agentready:schemas -- --check

      - name: AgentReady action smoke
        run: npm run agentready:action-smoke

      - name: Action bundle is up to date
        run: git diff --exit-code action/dist

      - name: AgentReady analytics-layer evaluation
        # Offline gold-corpus eval of the optional LLM layer (canned responses,
        # no model calls); fails if precision/recall/F1 drop below the floor.
        run: npm run agentready:eval

      - name: AgentReady PR regression gate
        if: github.event_name == 'pull_request'
        run: npm run agentready -- diff --base "origin/${BASE_REF}" --head HEAD . --json --compact --fail-on-regression
        env:
          BASE_REF: ${{ github.base_ref }}

      - name: AgentReady markdown report
        if: github.event_name == 'pull_request'
        run: npm run agentready -- diff --base "origin/${BASE_REF}" --head HEAD . --markdown
        env:
          BASE_REF: ${{ github.base_ref }}

      - name: Build
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
