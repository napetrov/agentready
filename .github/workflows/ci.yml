name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: AgentReady self scan
        run: npm run agentready -- scan . --json --compact

      - name: AgentReady fixture smoke
        run: npm run agentready:fixtures

      - name: AgentReady pack/install smoke
        run: npm run agentready:pack-smoke

      - name: AgentReady PR regression gate
        if: github.event_name == 'pull_request'
        run: npm run agentready -- diff --base "origin/${BASE_REF}" --head HEAD . --json --compact --fail-on-regression
        env:
          BASE_REF: ${{ github.base_ref }}

      - name: AgentReady markdown report
        if: github.event_name == 'pull_request'
        run: npm run agentready -- diff --base "origin/${BASE_REF}" --head HEAD . --markdown
        env:
          BASE_REF: ${{ github.base_ref }}

      - name: Build
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
