name: 'AgentReady Repository Scanner'
description: 'Scan a repository for AI coding-agent readiness and gate pull requests on regressions.'
author: 'AgentReady'
branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  path:
    description: 'Path to the repository (or subdirectory) to scan.'
    required: false
    default: '.'
  mode:
    description: 'scan (full repository) or diff (compare two refs).'
    required: false
    default: 'scan'
  base-ref:
    description: 'Base git ref for diff mode (e.g. origin/main).'
    required: false
    default: ''
  head-ref:
    description: 'Head git ref for diff mode (e.g. HEAD).'
    required: false
    default: ''
  config:
    description: 'Path to an AgentReady config file.'
    required: false
    default: ''
  fail-on-severity:
    description: 'Fail when a finding at or above this severity is present: off, info, warning, or error.'
    required: false
    default: 'error'
  fail-on-regression:
    description: 'In diff mode, fail when new error/warning regressions are introduced.'
    required: false
    default: 'false'
  min-score:
    description: 'Fail when the readiness score is below this value (0-100). Empty disables the gate.'
    required: false
    default: ''
  policy:
    description: 'Policy pack applying severity adjustments before gating: default (no-op), enterprise (stricter instruction/install/deploy gates), oss (stricter contribution-onboarding gates), or ml-scientific (relaxed large-fixture/lint gates). Raw findings/score are never mutated; see docs/product/policy-packs.md.'
    required: false
    default: 'default'
  job-summary:
    description: 'Write the markdown report to the GitHub Actions job summary.'
    required: false
    default: 'true'
  pr-comment:
    description: 'Post (and update in place) a sticky pull-request comment with the markdown report. Requires github-token with pull-requests: write and a pull_request-triggered run. Fail-open: commenting problems warn but never fail the action.'
    required: false
    default: 'false'
  pr-comment-condition:
    description: 'When to post the PR comment: on-findings (default — comment only when there are new findings/regressions, staying silent on clean runs but still updating a prior comment to its resolved state) or always (post on every run, including clean ones).'
    required: false
    default: 'on-findings'
  github-token:
    description: 'Token used to post the PR comment (needs pull-requests: write). Defaults to the workflow GITHUB_TOKEN. Only used when pr-comment is enabled.'
    required: false
    default: ${{ github.token }}
  upload-sarif:
    description: 'Write a SARIF report alongside the JSON/markdown reports.'
    required: false
    default: 'false'
  output-dir:
    description: 'Directory the report artifacts are written to.'
    required: false
    default: '.agentready'
  tool-version:
    description: 'Tool version recorded in the SARIF driver.'
    required: false
    default: ''
  analyze:
    description: 'Run the optional LLM analytics layer after the deterministic gates. Requires a provider (e.g. GitHub Models via AGENTREADY_USE_GITHUB_MODELS=1 + GITHUB_TOKEN with models: read). Off by default; absent a provider it runs deterministic-only.'
    required: false
    default: 'false'
  analyze-min-score:
    description: 'Fail when the augmented score is below this value (0-100). Empty disables the augmented-score gate. Only meaningful with analyze enabled.'
    required: false
    default: ''

outputs:
  score:
    description: 'Readiness score (0-100). In diff mode, the head score.'
  findings-count:
    description: 'Number of findings (in diff mode, the number of new findings).'
  regressions-count:
    description: 'Number of readiness regressions (diff mode only).'
  json-report-path:
    description: 'Path to the written JSON report.'
  markdown-report-path:
    description: 'Path to the written markdown report.'
  sarif-report-path:
    description: 'Path to the written SARIF report, when upload-sarif is enabled.'
  augmented-score:
    description: 'The LLM-augmented score (0-100), when analyze is enabled.'
  augmented-report-path:
    description: 'Path to the written augmented report, when analyze is enabled.'
  policy-adjustments-count:
    description: 'Number of findings whose severity the policy pack adjusted (0 for the default policy).'
  policy-effective-score:
    description: 'The policy-adjusted score, when a non-default policy is set. `score` is always the raw, policy-independent value.'

runs:
  using: 'node24'
  main: 'action/dist/index.js'
